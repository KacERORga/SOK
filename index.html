<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOK - Вход и регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="container">
        <div class="auth-box">
            <div class="logo-wrapper">
                <div class="logo-icon">SOK</div>
                <h1>SOK Соцсеть</h1>
                <p>от KacERORga Prokaznicaet Corporated</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="login-form" class="form-container active">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder=" ">
                    <label>Имя пользователя</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder=" ">
                    <label>Пароль</label>
                </div>
                <button class="glow-btn" onclick="login()">Войти</button>
                <div id="login-error" class="error"></div>
            </div>

            <!-- Форма регистрации -->
            <div id="register-form" class="form-container">
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder=" ">
                    <label>Имя пользователя</label>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder=" ">
                    <label>Ваше имя</label>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" placeholder=" ">
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" placeholder=" ">
                    <label>Пароль</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password2" placeholder=" ">
                    <label>Повторите пароль</label>
                </div>
                <button class="glow-btn" onclick="register()">Зарегистрироваться</button>
                <div id="reg-error" class="error"></div>
            </div>
        </div>
    </div>

    <script>
        // Показать вкладку
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Регистрация
        function register() {
            const username = document.getElementById('reg-username').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            const errorDiv = document.getElementById('reg-error');

            // Валидация
            if (!username || !password || !email) {
                errorDiv.textContent = 'Заполните все поля';
                return;
            }
            if (username.length < 3) {
                errorDiv.textContent = 'Имя пользователя должно быть не менее 3 символов';
                return;
            }
            if (password.length < 4) {
                errorDiv.textContent = 'Пароль должен быть не менее 4 символов';
                return;
            }
            if (password !== password2) {
                errorDiv.textContent = 'Пароли не совпадают';
                return;
            }

            // Получаем список пользователей из localStorage
            let users = JSON.parse(localStorage.getItem('sok_users') || '[]');
            
            // Проверка на существующего пользователя
            if (users.find(u => u.username === username)) {
                errorDiv.textContent = 'Пользователь с таким именем уже существует';
                return;
            }
            if (users.find(u => u.email === email)) {
                errorDiv.textContent = 'Пользователь с таким email уже существует';
                return;
            }

            // Создаём нового пользователя
            const newUser = {
                id: Date.now(),
                username: username,
                name: name || username,
                email: email,
                password: password,
                avatar: username.charAt(0).toUpperCase(),
                followers: [],
                following: [],
                created_at: Date.now()
            };

            users.push(newUser);
            localStorage.setItem('sok_users', JSON.stringify(users));
            
            errorDiv.style.color = '#4ade80';
            errorDiv.textContent = 'Регистрация успешна! Теперь войдите.';
            
            // Очищаем форму
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-name').value = '';
            document.getElementById('reg-email').value = '';
            document.getElementById('reg-password').value = '';
            document.getElementById('reg-password2').value = '';
            
            // Переключаемся на вход через 1.5 секунды
            setTimeout(() => {
                errorDiv.textContent = '';
                errorDiv.style.color = '#ff6b6b';
                showTab('login');
            }, 1500);
        }

        // Вход
        function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if (!username || !password) {
                errorDiv.textContent = 'Введите имя пользователя и пароль';
                return;
            }

            let users = JSON.parse(localStorage.getItem('sok_users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                errorDiv.textContent = 'Неверное имя пользователя или пароль';
                return;
            }

            // Сохраняем текущего пользователя
            localStorage.setItem('sok_current_user', JSON.stringify({
                id: user.id,
                username: user.username,
                name: user.name,
                avatar: user.avatar
            }));

            // Перенаправляем на ленту
            window.location.href = '/feed.html';
        }

        // Автоматическая проверка — если уже залогинены, кидаем на ленту
        const currentUser = JSON.parse(localStorage.getItem('sok_current_user') || 'null');
        if (currentUser) {
            window.location.href = '/feed.html';
        }
    </script>
</body>
</html>
