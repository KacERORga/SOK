<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOK - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="container">
        <div class="auth-box">
            <div class="logo-wrapper">
                <div class="logo-icon">SOK</div>
                <h1>SOK Соцсеть</h1>
                <p>от KacERORga Prokaznicaet Corporated</p>
            </div>
            
            <div class="demo-mode">
                <p>🎉 Демо-режим</p>
                <p style="font-size: 0.9rem; margin: 1rem 0;">Вы заходите как гость</p>
                <button class="glow-btn" onclick="enterAsGuest()">Войти как гость</button>
            </div>
        </div>
    </div>

    <script>
        function enterAsGuest() {
            localStorage.setItem('user', JSON.stringify({
                username: 'Гость_' + Math.floor(Math.random() * 1000),
                name: 'Гость',
                id: Date.now()
            }));
            window.location.href = '/feed.html';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
